name: Refresh Meme Library

on:
  schedule:
    - cron: '17 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-meme-library
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Check out the production branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh the broad catalog
        run: npm run catalog:refresh

      - name: Refresh direct X media
        run: npm run x-media:refresh

      - name: Run tests
        run: npm test -- --run

      - name: Build production assets
        run: npm run build

      - name: Commit refreshed generated data
        run: |
          git config user.name "meme-library-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data/catalog.generated.json src/data/xMedia.generated.json
          if git diff --cached --quiet; then
            echo "Catalog is already current."
          else
            git commit -m "chore: refresh meme library data"
            git push
          fi

      - name: Pull Vercel production settings
        run: npx --yes vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build with Vercel
        run: npx --yes vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy production
        run: npx --yes vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
